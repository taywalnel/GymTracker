@if (isLoading) {
  <div class="state-message">Loading exercise…</div>
} @else if (state && exercise) {
  <app-exercise-card
    [exercise]="exercise"
    [isCurrent]="true"
    [savedSets]="savedSets"
    (setsChanged)="onSetsChanged($event)"
    (markComplete)="onMarkComplete()"
    (back)="goToWorkout()"
  />
}
