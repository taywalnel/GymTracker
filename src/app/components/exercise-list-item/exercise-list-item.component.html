<div class="top" [class.top--with-btn]="showEditBtn">
  @if (nameLink) {
    <a class="name" [routerLink]="nameLink">{{ name }}</a>
  } @else {
    <span class="name">{{ name }}</span>
  }
  @if (showEditBtn) {
    <app-button variant="icon" aria-label="Edit exercise">✏</app-button>
  } @else if (meta) {
    <span class="meta">{{ meta }}</span>
  }
</div>
@if (showEditBtn && meta) {
  <span class="subtitle">{{ meta }}</span>
}
@if (navDots) {
  <app-nav-dots [items]="navDots" [layout]="navDotsLayout" />
}
