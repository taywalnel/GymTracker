<div class="login-page">
  <div class="login-card">
    <h1 class="login-card__title">Gym Tracker</h1>
    <p class="login-card__subtitle">Sign in to sync your workouts</p>
    <form
      class="login-card__form"
      [formGroup]="credentialsForm"
      (ngSubmit)="login()"
    >
      <label class="login-card__field" for="email">
        <span>Email</span>
        <input
          id="email"
          type="email"
          autocomplete="email"
          formControlName="email"
        />
        @if (
          credentialsForm.controls.email.touched &&
          credentialsForm.controls.email.invalid
        ) {
          <span class="login-card__validation"
            >Enter a valid email address.</span
          >
        }
      </label>

      <label class="login-card__field" for="password">
        <span>Password</span>
        <input
          id="password"
          type="password"
          autocomplete="current-password"
          formControlName="password"
        />
        @if (
          credentialsForm.controls.password.touched &&
          credentialsForm.controls.password.invalid
        ) {
          <span class="login-card__validation"
            >Password must be at least 6 characters.</span
          >
        }
      </label>

      <button
        class="login-card__submit"
        type="submit"
        [disabled]="auth.isLoading()"
      >
        {{ auth.isLoading() ? "Signing in..." : "Log in" }}
      </button>
      <button
        class="login-card__create"
        type="button"
        (click)="register()"
        [disabled]="auth.isLoading()"
      >
        Create account
      </button>
    </form>

    <button
      class="login-card__reset"
      type="button"
      (click)="resetPassword()"
      [disabled]="auth.isLoading()"
    >
      Forgot password?
    </button>
    @if (auth.authError()) {
      <p class="login-card__error">{{ auth.authError() }}</p>
    }
  </div>
</div>
