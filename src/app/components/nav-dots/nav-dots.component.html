<div
  class="nav-dots"
  [class.nav-dots--spread]="layout === 'spread'"
  [class.nav-dots--muted]="muted"
  role="list"
>
  @for (item of items; track item.id) {
    <button
      type="button"
      class="nav-dot"
      [class.is-active]="item.isActive"
      [class.is-complete]="item.isComplete"
      [class.is-short]="item.isComplete && item.isShort"
      [attr.aria-label]="item.ariaLabel"
    >
      @if (item.label !== undefined && item.label !== null) {
        {{ item.label }}
      }
    </button>
  }
</div>
