<div class="program-container">
  <div class="program-header">
    <h2 class="program-title">Workouts</h2>
    <a routerLink="/program/edit" class="program-add-btn">+ New Routine</a>
  </div>

  @if (loading) {
    <div class="loading">Loading routines...</div>
  }

  @if (!loading && routines.length === 0) {
    <div class="empty-state">
      <p>No routines yet. Create your first routine to get started.</p>
    </div>
  }

  @if (!loading && routines.length > 0) {
    <div class="routine-list">
      @for (routine of routines; track routine.id) {
        <app-routine-card
          [routine]="routine"
          [showEditButton]="true"
          [showDeleteButton]="true"
          (editRequested)="editRoutine($event)"
          (deleteRequested)="deleteRoutine($event.id)"
        ></app-routine-card>
      }
    </div>
  }
</div>
